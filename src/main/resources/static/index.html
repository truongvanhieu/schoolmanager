<!doctype html>
<html lang="vi">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Quản lý sinh viên | AdminLTE 4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
      crossorigin="anonymous"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./adminlte/css/adminlte.css" />
  </head>
  <body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
    <div class="app-wrapper">
      <nav class="app-header navbar navbar-expand bg-body">
        <div class="container-fluid">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
                <i class="bi bi-list"></i>
              </a>
            </li>
            <li class="nav-item d-none d-md-block">
              <span class="nav-link fw-semibold">Quản lý sinh viên</span>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#" data-lte-toggle="fullscreen">
                <i data-lte-icon="maximize" class="bi bi-arrows-fullscreen"></i>
                <i data-lte-icon="minimize" class="bi bi-fullscreen-exit" style="display: none"></i>
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
        <div class="sidebar-brand">
          <a href="./index.html" class="brand-link">
            <img
              src="./adminlte/assets/img/AdminLTELogo.png"
              alt="AdminLTE Logo"
              class="brand-image opacity-75 shadow"
            />
            <span class="brand-text fw-light">School Manager</span>
          </a>
        </div>
        <div class="sidebar-wrapper">
          <nav class="mt-2">
            <ul
              class="nav sidebar-menu flex-column"
              data-lte-toggle="treeview"
              role="navigation"
              aria-label="Main navigation"
              data-accordion="false"
            >
              <li class="nav-item">
                <a href="./index.html" class="nav-link active">
                  <i class="nav-icon bi bi-people-fill"></i>
                  <p>Sinh viên</p>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </aside>

      <main class="app-main">
        <div class="app-content-header">
          <div class="container-fluid">
            <div class="row">
              <div class="col-sm-6">
                <h3 class="mb-0">Quản lý sinh viên</h3>
              </div>
              <div class="col-sm-6">
                <ol class="breadcrumb float-sm-end">
                  <li class="breadcrumb-item"><a href="#">Home</a></li>
                  <li class="breadcrumb-item active" aria-current="page">Students</li>
                </ol>
              </div>
            </div>
          </div>
        </div>

        <div class="app-content">
          <div class="container-fluid">
            <div class="card">
              <div class="card-header d-flex flex-wrap gap-2 align-items-center">
                <h3 class="card-title mb-0">Danh sách sinh viên</h3>
                <div class="ms-auto d-flex flex-wrap gap-2">
                  <div class="input-group input-group-sm" style="width: 260px">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input
                      type="text"
                      id="searchInput"
                      class="form-control"
                      placeholder="Tìm gần đúng theo tên/email..."
                    />
                  </div>
                  <button class="btn btn-primary btn-sm" id="btnAdd">
                    <i class="bi bi-plus-circle me-1"></i> Thêm sinh viên
                  </button>
                </div>
              </div>
              <div class="card-body table-responsive p-0">
                <table class="table table-hover text-nowrap mb-0">
                  <thead>
                    <tr>
                      <th style="width: 40%">Tên</th>
                      <th style="width: 40%">Email</th>
                      <th style="width: 20%" class="text-end">Hành động</th>
                    </tr>
                  </thead>
                  <tbody id="studentTableBody"></tbody>
                </table>
              </div>
              <div class="card-footer d-flex flex-wrap justify-content-between align-items-center gap-2">
                <div class="small text-secondary" id="paginationInfo"></div>
                <nav>
                  <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                </nav>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="app-footer">
        <div class="float-end d-none d-sm-inline">School Manager</div>
        <strong>Quản lý sinh viên với AdminLTE 4</strong>
      </footer>
    </div>

    <div class="modal fade" id="studentModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="studentModalTitle">Thêm sinh viên</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="studentId" />
            <div class="mb-3">
              <label class="form-label">Tên</label>
              <input type="text" id="studentName" class="form-control" />
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" id="studentEmail" class="form-control" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="button" class="btn btn-primary" id="btnSaveStudent">Lưu</button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="./adminlte/js/adminlte.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const API_BASE = '/api/students';
        const PAGE_SIZE = 5;

        let currentPage = 0; // 0-based theo backend
        let totalPages = 0;
        let totalElements = 0;

        const tableBody = document.getElementById('studentTableBody');
        const pagination = document.getElementById('pagination');
        const paginationInfo = document.getElementById('paginationInfo');
        const searchInput = document.getElementById('searchInput');

        const studentModalEl = document.getElementById('studentModal');
        const studentModalTitle = document.getElementById('studentModalTitle');
        const studentIdInput = document.getElementById('studentId');
        const studentNameInput = document.getElementById('studentName');
        const studentEmailInput = document.getElementById('studentEmail');
        const btnSaveStudent = document.getElementById('btnSaveStudent');
        const btnAdd = document.getElementById('btnAdd');

        var studentModal = null;
        if (window.bootstrap && studentModalEl) {
          studentModal = new window.bootstrap.Modal(studentModalEl);
        }

        function highlightText(text, term) {
          if (!term) return text;
          const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const re = new RegExp(escaped, 'ig');
          return text.replace(re, function (m) {
            return '<mark>' + m + '</mark>';
          });
        }

        function renderTable(students) {
          const term = searchInput.value.trim();
          tableBody.innerHTML = students
            .map(function (s) {
              return (
                '<tr>' +
                '<td>' +
                highlightText(s.name || '', term) +
                '</td>' +
                '<td>' +
                highlightText(s.email || '', term) +
                '</td>' +
                '<td class="text-end">' +
                '<button class="btn btn-sm btn-outline-secondary me-1" data-id="' +
                s.id +
                '" data-action="edit">' +
                '<i class="bi bi-pencil"></i>' +
                '</button>' +
                '<button class="btn btn-sm btn-outline-danger" data-id="' +
                s.id +
                '" data-action="delete">' +
                '<i class="bi bi-trash"></i>' +
                '</button>' +
                '</td>' +
                '</tr>'
              );
            })
            .join('');

          const from = totalElements === 0 ? 0 : currentPage * PAGE_SIZE + 1;
          const to = Math.min((currentPage + 1) * PAGE_SIZE, totalElements);
          paginationInfo.textContent =
            'Hiển thị ' + from + '-' + to + ' trên tổng ' + totalElements + ' sinh viên';

          renderPagination();
        }

        function renderPagination() {
          if (totalPages === 0) {
            pagination.innerHTML = '';
            return;
          }

          var html = '';
          html +=
            '<li class="page-item ' +
            (currentPage === 0 ? 'disabled' : '') +
            '"><a class="page-link" href="#" data-page="' +
            (currentPage - 1) +
            '">&laquo;</a></li>';

          for (var i = 0; i < totalPages; i++) {
            html +=
              '<li class="page-item ' +
              (i === currentPage ? 'active' : '') +
              '"><a class="page-link" href="#" data-page="' +
              i +
              '">' +
              (i + 1) +
              '</a></li>';
          }

          html +=
            '<li class="page-item ' +
            (currentPage === totalPages - 1 ? 'disabled' : '') +
            '"><a class="page-link" href="#" data-page="' +
            (currentPage + 1) +
            '">&raquo;</a></li>';

          pagination.innerHTML = html;
        }

        pagination.addEventListener('click', function (e) {
          if (e.target.tagName !== 'A') return;
          e.preventDefault();
          const page = Number(e.target.getAttribute('data-page'));
          if (isNaN(page) || page === currentPage || page < 0 || page >= totalPages) return;
          currentPage = page;
          loadStudents();
        });
        searchInput.addEventListener('input', function () {
          currentPage = 0;
          loadStudents();
        });

        async function loadStudents() {
          try {
            const params =
              '?keyword=' +
              encodeURIComponent(searchInput.value || '') +
              '&page=' +
              currentPage +
              '&size=' +
              PAGE_SIZE;
            const res = await fetch(API_BASE + '/search' + params);
            const data = await res.json();
            const students = Array.isArray(data.content) ? data.content : [];
            totalPages = typeof data.totalPages === 'number' ? data.totalPages : 0;
            totalElements = typeof data.totalElements === 'number' ? data.totalElements : students.length;
            renderTable(students);
          } catch (e) {
            console.error('Lỗi tải danh sách sinh viên', e);
          }
        }

        function openAddModal() {
          if (!studentModal) return;
          studentIdInput.value = '';
          studentNameInput.value = '';
          studentEmailInput.value = '';
          studentModalTitle.textContent = 'Thêm sinh viên';
          btnSaveStudent.dataset.mode = 'create';
          studentModal.show();
        }

        function openEditModal(student) {
          if (!studentModal) return;
          studentIdInput.value = student.id;
          studentNameInput.value = student.name || '';
          studentEmailInput.value = student.email || '';
          studentModalTitle.textContent = 'Cập nhật sinh viên';
          btnSaveStudent.dataset.mode = 'update';
          studentModal.show();
        }

        btnAdd.addEventListener('click', function () {
          openAddModal();
        });

        tableBody.addEventListener('click', function (e) {
          const btn = e.target.closest('button[data-action]');
          if (!btn) return;
          const id = btn.getAttribute('data-id');
          const action = btn.getAttribute('data-action');
          if (action === 'edit') {
            // Lấy chi tiết sinh viên từ API để luôn dữ liệu mới nhất
            fetch(API_BASE + '/' + id)
              .then(function (res) {
                return res.json();
              })
              .then(function (student) {
                openEditModal(student || {});
              })
              .catch(function () {
                alert('Không tải được thông tin sinh viên.');
              });
          } else if (action === 'delete') {
            if (confirm('Bạn có chắc chắn muốn xóa sinh viên này?')) {
              deleteStudent(id);
            }
          }
        });

        async function saveStudent() {
          const mode = btnSaveStudent.dataset.mode;
          const name = studentNameInput.value.trim();
          const email = studentEmailInput.value.trim();

          if (!name || !email) {
            alert('Vui lòng nhập đầy đủ tên và email.');
            return;
          }

          const payload = { name: name, email: email };
          const isUpdate = mode === 'update';
          const id = studentIdInput.value;

          const url = isUpdate ? API_BASE + '/' + id : API_BASE;
          const method = isUpdate ? 'PUT' : 'POST';

          try {
            const res = await fetch(url, {
              method: method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              throw new Error(await res.text());
            }
            if (studentModal) {
              studentModal.hide();
            }
            await loadStudents();
          } catch (e) {
            console.error('Lỗi lưu sinh viên', e);
            alert('Có lỗi xảy ra khi lưu sinh viên.');
          }
        }

        btnSaveStudent.addEventListener('click', function () {
          saveStudent();
        });

        async function deleteStudent(id) {
          try {
            const res = await fetch(API_BASE + '/' + id, { method: 'DELETE' });
            if (!res.ok) {
              throw new Error(await res.text());
            }
            await loadStudents();
          } catch (e) {
            console.error('Lỗi xóa sinh viên', e);
            alert('Có lỗi xảy ra khi xóa sinh viên.');
          }
        }

        const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
        const Default = {
          scrollbarTheme: 'os-theme-light',
          scrollbarAutoHide: 'leave',
          scrollbarClickScroll: true,
        };
        const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
        if (sidebarWrapper && window.OverlayScrollbarsGlobal && window.OverlayScrollbarsGlobal.OverlayScrollbars) {
          window.OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
            scrollbars: {
              theme: Default.scrollbarTheme,
              autoHide: Default.scrollbarAutoHide,
              clickScroll: Default.scrollbarClickScroll,
            },
          });
        }

        loadStudents();
      });
    </script>
  </body>
</html>
